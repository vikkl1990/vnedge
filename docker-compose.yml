services:
  paper-trial:
    build: .
    restart: unless-stopped
    environment:
      # dashboard binds 0.0.0.0 INSIDE the container; the port mapping below
      # exposes it only on the host's loopback — SSH-tunnel to reach it.
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_TOKEN: ${DASHBOARD_TOKEN:?set DASHBOARD_TOKEN in .env}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./research/paper_trials:/app/research/paper_trials
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  # Internet-facing TLS front (self-signed) so the read-only dashboard needs
  # no SSH tunnel. Port 8765 must be open in the cloud security list.
  dashboard-tls:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [paper-trial]
    ports:
      - "8765:8765"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/certs:/certs:ro
      - caddy_data:/data
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }

volumes:
  caddy_data:
