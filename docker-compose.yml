services:
  multi-lane-shadow:
    build: .
    restart: unless-stopped
    # Multi-exchange lanes: Binance + Bybit, each in BOTH fill modes —
    #   paper  = simulated fills on live data (live-$ venue comparison; the
    #            governed funding-MR trials continue on their account files)
    #   shadow = gateway-evaluated intents journaled, never a fill
    # Both live data, $500 imaginary base, NO live orders. Read-only dashboard.
    command: ["python", "-m", "vnedge.runtime.multi_lane_shadow"]
    environment:
      # dashboard binds 0.0.0.0 INSIDE the container; the port mapping below
      # exposes it only on the host's loopback — SSH-tunnel to reach it.
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_TOKEN: ${DASHBOARD_TOKEN:?set DASHBOARD_TOKEN in .env}
      # Optional per-user tokens: "name:token:role[:expiry_iso];..."
      # (docs/DASHBOARD_AUTH.md). DASHBOARD_TOKEN keeps working unchanged.
      DASHBOARD_USERS: ${DASHBOARD_USERS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      MULTI_LANE_EXCHANGES: "${MULTI_LANE_EXCHANGES:-binanceusdm,bybit,delta_india}"
      MULTI_LANE_SYMBOLS: "${MULTI_LANE_SYMBOLS:-BTC/USDT:USDT}"
      MULTI_LANE_MODES: "${MULTI_LANE_MODES:-paper,shadow}"
      MULTI_LANE_TIMEFRAME: "${MULTI_LANE_TIMEFRAME:-1h}"
      MULTI_LANE_PRIMARY_EXCHANGE: "${MULTI_LANE_PRIMARY_EXCHANGE:-binanceusdm}"
      MULTI_LANE_PRIMARY_SYMBOL: "${MULTI_LANE_PRIMARY_SYMBOL:-BTC/USDT:USDT}"
      MULTI_LANE_PRIMARY_MODE: "${MULTI_LANE_PRIMARY_MODE:-paper}"
      # Promote research-approved, locked-parameter candidates into SHADOW
      # observation lanes by default. These are never paper/live lanes and
      # still require untouched judgment + human approval before capital.
      MULTI_LANE_MANIFEST_ENABLED: "${MULTI_LANE_MANIFEST_ENABLED:-1}"
      # Runtime control-plane guard: if research/live_research/shadow_lanes.json
      # changes after startup, exit deliberately so Docker reloads the exact
      # desired lane set. This prevents MISSING/STALE/ORPHAN drift.
      MULTI_LANE_MANIFEST_RELOAD: "${MULTI_LANE_MANIFEST_RELOAD:-1}"
      MULTI_LANE_MANIFEST_RELOAD_SECONDS: "${MULTI_LANE_MANIFEST_RELOAD_SECONDS:-60}"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./research/paper_trials:/app/research/paper_trials
      - ./research/live_research:/app/research/live_research:ro
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  # Continuous research: hourly data refresh + rolling walk-forward +
  # promotion-gate verdicts. No execution access — it shares only market
  # data (rw) and the research output dir the dashboard reads (ro there).
  research-loop:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.research.continuous_research"]
    environment:
      RESEARCH_INTERVAL_SECONDS: "3600"
      # All three venues. delta_india has no ccxt funding history, so its
      # funding-strategy lanes are marked UNTESTABLE (not run) while its
      # candle-compatible lanes run — the research loop is funding-capability
      # aware (#41), so this no longer breaks the cycle.
      RESEARCH_EXCHANGES: "binanceusdm,bybit,delta_india"
      RESEARCH_SYMBOLS: "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,BNB/USDT:USDT,XRP/USDT:USDT,DOGE/USDT:USDT"
      # Optional comma allowlist for candle lanes. Empty/default means all
      # registered research strategies. Useful when splitting heavy Quant
      # sweeps into their own slower service without code changes.
      RESEARCH_STRATEGIES: "${RESEARCH_STRATEGIES:-}"
      EDGE_LEADERBOARD_MAX_ROWS: "${EDGE_LEADERBOARD_MAX_ROWS:-50}"
      EDGE_PROMOTION_QUEUE_MAX_ROWS: "${EDGE_PROMOTION_QUEUE_MAX_ROWS:-20}"
      # L2-mining passes run in the decoupled l2-research-loop below, NOT here,
      # so this hourly candle loop never scans the tick/L2 tape. It folds the
      # l2-research-loop's l2_latest.json into its dashboard latest.json. Flip
      # either to "1" to re-enable the pass inline (it then bloats this cycle).
      SCALPER_RESEARCH_ENABLED: "${SCALPER_RESEARCH_ENABLED:-0}"
      ALPHA_FACTORY_ENABLED: "${ALPHA_FACTORY_ENABLED:-0}"
    volumes:
      - ./data:/app/data
      - ./research/live_research:/app/research/live_research
      # read-only view of the shadow-lane journals so the edge leaderboard can
      # fold each lane's live virtual track record in (shadow_perf_reader);
      # ro because research must never write runtime journals
      - ./logs:/app/logs:ro
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Decoupled tick/L2 discovery — scalper discovery + structural alpha factory
  # on their OWN slow cadence (default 6h) so they never bloat the hourly candle
  # loop. Writes l2_latest.json; research-loop folds it into latest.json.
  # Research-only: can_trade=false, can_promote=false on every output.
  l2-research-loop:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.research.l2_research_loop"]
    environment:
      L2_RESEARCH_INTERVAL_SECONDS: "${L2_RESEARCH_INTERVAL_SECONDS:-21600}"
      # All recorder services below write to the same tick lake. Missing days
      # are still skipped by the mining loop; coverage is a recorder concern,
      # not a reason for the scanner to invent evidence.
      RESEARCH_EXCHANGES: "binanceusdm,bybit,delta_india"
      RESEARCH_SYMBOLS: "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,BNB/USDT:USDT,XRP/USDT:USDT,DOGE/USDT:USDT"
    volumes:
      - ./data:/app/data
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Fast recent-slice scout for interactive edge hunting. It reads only the
  # newest tick/L2 shards per lane and writes l2_scout_latest.json; the full
  # l2-research-loop above remains the conservative replay/tournament source
  # of truth. Research-only: no credentials, no orders, no promotion.
  l2-fast-scout:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.research.fast_l2_scout",
              "--interval-seconds", "${L2_SCOUT_INTERVAL_SECONDS:-900}",
              "--lookback-minutes", "${L2_SCOUT_LOOKBACK_MINUTES:-30}",
              "--max-shards", "${L2_SCOUT_MAX_SHARDS:-40}",
              "--max-results", "${L2_SCOUT_MAX_RESULTS:-100}"]
    environment:
      RESEARCH_EXCHANGES: "binanceusdm,bybit,delta_india"
      RESEARCH_SYMBOLS: "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,BNB/USDT:USDT,XRP/USDT:USDT,DOGE/USDT:USDT"
    volumes:
      - ./data:/app/data
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Public trade footprint/CVD miner. It compresses recorded trade tape into
  # delta/CVD/stacked-imbalance research artifacts and queues replay-required
  # anomalies for the council. Research-only: no credentials, no orders.
  orderflow-footprint-miner:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.research.orderflow_footprint",
              "--interval-seconds", "${ORDERFLOW_FOOTPRINT_INTERVAL_SECONDS:-1800}",
              "--bar-seconds", "${ORDERFLOW_FOOTPRINT_BAR_SECONDS:-60}",
              "--max-candidates", "${ORDERFLOW_FOOTPRINT_MAX_CANDIDATES:-100}"]
    environment:
      RESEARCH_EXCHANGES: "binanceusdm,bybit,delta_india"
      RESEARCH_SYMBOLS: "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,BNB/USDT:USDT,XRP/USDT:USDT,DOGE/USDT:USDT"
    volumes:
      - ./data:/app/data:ro
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Scheduled cross-venue event lead-lag miner. It refreshes
  # event_leadlag_latest.json so the council/workbench do not keep debating
  # stale candidate definitions. Research-only: no credentials, no orders.
  event-leadlag-miner:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.research.event_leadlag_alpha",
              "--interval-seconds", "${EVENT_LEADLAG_INTERVAL_SECONDS:-3600}",
              "--lookback-days", "${EVENT_LEADLAG_LOOKBACK_DAYS:-60}",
              "--min-samples", "${EVENT_LEADLAG_MIN_SAMPLES:-20}",
              "--max-results", "${EVENT_LEADLAG_MAX_RESULTS:-100}"]
    environment:
      RESEARCH_EXCHANGES: "binanceusdm,bybit,delta_india"
      RESEARCH_SYMBOLS: "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,BNB/USDT:USDT,XRP/USDT:USDT,DOGE/USDT:USDT"
    volumes:
      - ./data:/app/data:ro
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Minute-level shadow journal for the SOL/XRP Delta-follower lead-lag
  # candidates surfaced by event_leadlag_alpha. This is observability only:
  # it writes event_leadlag_eval + shadow_intent records, logs why no trade,
  # and never submits orders or simulates candle-only maker fills.
  event-leadlag-shadow:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.runtime.event_leadlag_shadow_runner",
              "--interval-seconds", "${EVENT_LEADLAG_SHADOW_INTERVAL_SECONDS:-60}",
              "--max-data-age-minutes", "${EVENT_LEADLAG_SHADOW_MAX_DATA_AGE_MINUTES:-180}",
              "--scan-lookback-minutes", "${EVENT_LEADLAG_SHADOW_SCAN_LOOKBACK_MINUTES:-5}",
              "--refresh-overlap-minutes", "${EVENT_LEADLAG_SHADOW_REFRESH_OVERLAP_MINUTES:-30}",
              "--refresh-bootstrap-minutes", "${EVENT_LEADLAG_SHADOW_REFRESH_BOOTSTRAP_MINUTES:-360}"]
    volumes:
      # Writable because this runner refreshes public 1m candle context and the
      # data-quality gate writes reports under data/reports/. Still no
      # credentials and no execution path.
      - ./data:/app/data
      - ./logs:/app/logs
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Conservative event-to-quote replay for mined microstructure candidates.
  # This is the execution-native proof step between a research anomaly and any
  # shadow/paper discussion: passive maker quote, conservative trade-through
  # fill, taker exit, honest fees. Research-only; no credentials, no orders.
  candidate-replay-executor:
    build: .
    restart: unless-stopped
    depends_on: [event-leadlag-miner, orderflow-footprint-miner]
    command: ["python", "-m", "vnedge.research.candidate_replay_executor",
              "--interval-seconds", "${CANDIDATE_REPLAY_INTERVAL_SECONDS:-1800}",
              "--max-event-leadlag", "${CANDIDATE_REPLAY_MAX_EVENT_LEADLAG:-12}",
              "--max-orderflow", "${CANDIDATE_REPLAY_MAX_ORDERFLOW:-60}"]
    volumes:
      - ./data:/app/data:ro
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Post-mortem miner for replay failures. It classifies why candidates fail
  # (spread, stale book, no trade-through, queue risk, adverse selection, fee
  # wall) and emits filter hypotheses that must be replayed fresh. Research-only.
  execution-condition-miner:
    build: .
    restart: unless-stopped
    depends_on: [candidate-replay-executor]
    command: ["python", "-m", "vnedge.research.execution_condition_miner",
              "--interval-seconds", "${EXECUTION_CONDITION_INTERVAL_SECONDS:-1800}"]
    volumes:
      - ./data:/app/data:ro
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Fresh filtered replay for execution-condition hypotheses. It excludes
  # already-seen candidate replay days by default, applies only causal/pre-entry
  # filters, then reruns the same conservative replay engine. Research-only.
  filtered-replay-executor:
    build: .
    restart: unless-stopped
    depends_on: [execution-condition-miner]
    command: ["python", "-m", "vnedge.research.filtered_replay_executor",
              "--interval-seconds", "${FILTERED_REPLAY_INTERVAL_SECONDS:-1800}",
              "--max-event-leadlag", "${FILTERED_REPLAY_MAX_EVENT_LEADLAG:-12}",
              "--max-orderflow", "${FILTERED_REPLAY_MAX_ORDERFLOW:-60}"]
    volumes:
      - ./data:/app/data:ro
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Operator truth table for "what is firing and what can be promoted?" It
  # joins the shadow-lane manifest, filtered replay trials, and live shadow
  # outcome journals into lane_promotion_readiness_latest.json. Read-only:
  # can_trade=false/can_promote=false on every row.
  lane-promotion-readiness:
    build: .
    restart: unless-stopped
    depends_on: [multi-lane-shadow, filtered-replay-executor]
    command: ["python", "-m", "vnedge.research.lane_promotion_readiness",
              "--interval-seconds", "${LANE_PROMOTION_READINESS_INTERVAL_SECONDS:-300}",
              "--min-shadow-trades", "${LANE_PROMOTION_MIN_SHADOW_TRADES:-10}",
              "--min-shadow-span-days", "${LANE_PROMOTION_MIN_SHADOW_SPAN_DAYS:-7}",
              "--min-shadow-profit-factor", "${LANE_PROMOTION_MIN_SHADOW_PROFIT_FACTOR:-1.25}"]
    volumes:
      - ./logs:/app/logs:ro
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Live scanner: answers "what is firing now / near trigger / waiting why?"
  # from current runtime journals only. It deliberately does NOT read replay
  # artifacts, and it cannot trade or promote.
  realtime-scanner:
    build: .
    restart: unless-stopped
    depends_on: [multi-lane-shadow, event-leadlag-shadow]
    command: ["python", "-m", "vnedge.research.realtime_scanner",
              "--interval-seconds", "${REALTIME_SCANNER_INTERVAL_SECONDS:-60}"]
    volumes:
      - ./logs:/app/logs:ro
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Daily scalper miner: 4h/1h context, 15m setup, 1m trigger across all
  # configured exchanges/symbols/families. Slow cadence by design: it is
  # research-only and feeds the council/workbench, never execution.
  daily-scalper-pack:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.research.daily_scalper_pack",
              "--interval-seconds", "${DAILY_SCALPER_INTERVAL_SECONDS:-21600}",
              "--lookback-days", "${DAILY_SCALPER_LOOKBACK_DAYS:-120}",
              "--train-days", "${DAILY_SCALPER_TRAIN_DAYS:-30}",
              "--test-days", "${DAILY_SCALPER_TEST_DAYS:-7}",
              "--max-candidates", "${DAILY_SCALPER_MAX_CANDIDATES:-72}"]
    environment:
      RESEARCH_EXCHANGES: "binanceusdm,bybit,delta_india"
      RESEARCH_SYMBOLS: "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,BNB/USDT:USDT,XRP/USDT:USDT,DOGE/USDT:USDT"
    volumes:
      - ./data:/app/data:ro
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Public-indicator distillation miner: Lux/Willy-style ideas reduced to
  # causal VNEDGE atoms, then walk-forwarded with realistic fees. Research-only
  # proof feed for the Alpha Council.
  alpha-distillation:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.research.alpha_distillation",
              "--interval-seconds", "${ALPHA_DISTILLATION_INTERVAL_SECONDS:-21600}",
              "--lookback-days", "${ALPHA_DISTILLATION_LOOKBACK_DAYS:-120}",
              "--train-days", "${ALPHA_DISTILLATION_TRAIN_DAYS:-30}",
              "--test-days", "${ALPHA_DISTILLATION_TEST_DAYS:-7}",
              "--max-candidates", "${ALPHA_DISTILLATION_MAX_CANDIDATES:-18}"]
    environment:
      RESEARCH_EXCHANGES: "binanceusdm,bybit,delta_india"
      RESEARCH_SYMBOLS: "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,BNB/USDT:USDT,XRP/USDT:USDT,DOGE/USDT:USDT"
    volumes:
      - ./data:/app/data:ro
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Bitcoin-native regime sensor: read-only node/mempool/fee telemetry that
  # tags research windows as calm/building/stressed/panic. It is context only:
  # no wallet RPCs, no exchange credentials, no data/execution mounts.
  bitcoin-regime-sensor:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.research.bitcoin_regime",
              "--interval-seconds", "${BITCOIN_REGIME_INTERVAL_SECONDS:-900}"]
    environment:
      BITCOIN_RPC_URL: "${BITCOIN_RPC_URL:-}"
      BITCOIN_RPC_USER: "${BITCOIN_RPC_USER:-}"
      BITCOIN_RPC_PASSWORD: "${BITCOIN_RPC_PASSWORD:-}"
      MEMPOOL_API_BASE: "${MEMPOOL_API_BASE:-https://mempool.space}"
    volumes:
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Research-only agent debate layer. Reads the published research artifacts,
  # ranks candidates, and emits the next proof step. It has no data/execution
  # mounts and cannot place or promote trades.
  alpha-council:
    build: .
    restart: unless-stopped
    depends_on: [daily-scalper-pack, alpha-distillation, event-leadlag-miner, orderflow-footprint-miner, candidate-replay-executor, execution-condition-miner, filtered-replay-executor, bitcoin-regime-sensor]
    command: ["python", "-m", "vnedge.research.alpha_council",
              "--interval-seconds", "${ALPHA_COUNCIL_INTERVAL_SECONDS:-900}",
              "--max-candidates", "${ALPHA_COUNCIL_MAX_CANDIDATES:-40}"]
    volumes:
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Durable alpha proof-task queue. It consumes the alpha council verdicts and
  # checkpoints replay/judgment/recording tasks into small chunks so restarts do
  # not rediscover the same work. Research-only: no credentials, no orders.
  alpha-workbench:
    build: .
    restart: unless-stopped
    depends_on: [alpha-council]
    command: ["python", "-m", "vnedge.research.alpha_workbench",
              "--interval-seconds", "${ALPHA_WORKBENCH_INTERVAL_SECONDS:-900}",
              "--max-tasks", "${ALPHA_WORKBENCH_MAX_TASKS:-50}"]
    volumes:
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Zero-risk Binance tick + top-of-book recorder. No credentials, no execution —
  # collects the raw order-flow data the TRUE microstructure scalper backtest
  # needs (candle proxies proved too weak to conclude). Replay after ~2 weeks.
  tick-recorder:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.exchange.tick_recorder",
              "--symbols",
              "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,BNB/USDT:USDT,XRP/USDT:USDT,DOGE/USDT:USDT",
              "--data-root", "/app/data", "--levels", "10"]
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Zero-risk Bybit public L2/trade recorder. Same major universe as Binance,
  # written into ticks/exchange=bybit/... for scanner + replay parity.
  tick-recorder-bybit:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.exchange.tick_recorder",
              "--exchange", "bybit",
              "--symbols",
              "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,BNB/USDT:USDT,XRP/USDT:USDT,DOGE/USDT:USDT",
              "--data-root", "/app/data", "--levels", "10"]
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Delta India L2/trade recorder — native websocket (Delta has no CCXT Pro
  # class), writing the same six-symbol campaign to the atomic Parquet tick
  # lake under ticks/exchange=delta_india/… so scalper discovery and the L2
  # research loop pick it up with no other changes.
  tick-recorder-delta:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.exchange.tick_recorder",
              "--exchange", "delta_india",
              "--symbols", "BTC/USD:USD,ETH/USD:USD,SOL/USD:USD,BNB/USD:USD,XRP/USD:USD,DOGE/USD:USD",
              "--data-root", "/app/data", "--levels", "10"]
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Zero-risk Binance USDT-M liquidation (forceOrder) recorder. Public stream,
  # no credentials — captures the forced-liquidation events the event-scalper
  # families key on most, into ticks/.../stream=liquidations/.
  liquidation-recorder:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.exchange.liquidation_recorder",
              "--symbols",
              "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,BNB/USDT:USDT,XRP/USDT:USDT,DOGE/USDT:USDT",
              "--data-root", "/app/data"]
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Liquidation-cascade reversion replay (research only, can_trade/can_promote
  # false). Every 6h it rescans the recorded liquidation days against the
  # trade tape, reports taker-taker AND maker-first cost models side by side
  # (maker numbers flagged ASSUMED_MAKER_FILL), and publishes
  # cascade_reversion.json for the continuous-research folding hook.
  cascade-reversion:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.research.cascade_reversion",
              "--interval-seconds", "${CASCADE_REVERSION_INTERVAL_SECONDS:-21600}",
              "--exchanges", "binanceusdm,bybit",
              "--symbols",
              "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,BNB/USDT:USDT,XRP/USDT:USDT,DOGE/USDT:USDT",
              "--data-root", "/app/data"]
    volumes:
      - ./data:/app/data:ro
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Cross-venue lead-lag echo scalp replay (research only, can_trade/can_promote
  # false). Every 6h it rescans the recorded leader (binanceusdm trades) vs
  # follower (delta_india L2 book) overlap days, estimates the cross-venue lag,
  # replays a maker-first echo scalp with a queue-aware follower fill against a
  # strict taker_taker floor (maker numbers flagged ASSUMED_QUEUE_FILL), and
  # publishes leadlag_echo_scalp.json for the continuous-research folding hook.
  leadlag-echo-scalp:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.research.leadlag_echo_scalp",
              "--interval-seconds", "${LEADLAG_ECHO_SCALP_INTERVAL_SECONDS:-21600}",
              "--pairs", "BTC,ETH",
              "--data-root", "/app/data"]
    volumes:
      - ./data:/app/data:ro
      - ./research/live_research:/app/research/live_research
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Zero-risk Bybit liquidation recorder (allLiquidation topic via CCXT Pro;
  # position side is normalised to forced-order side on ingest). Same universe,
  # written into ticks/exchange=bybit/.../stream=liquidations/ for parity.
  liquidation-recorder-bybit:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.exchange.liquidation_recorder",
              "--exchange", "bybit",
              "--symbols",
              "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,BNB/USDT:USDT,XRP/USDT:USDT,DOGE/USDT:USDT",
              "--data-root", "/app/data"]
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Tick-lake janitor: every 6h it compacts each closed day's per-flush shards
  # into one sorted Parquet file and enforces per-stream retention (book 21d /
  # trades 60d / liquidations 120d) so the recorders can't eat the disk. The
  # binanceusdm_hist backfill archive is never touched. A disk-pressure guard
  # trims the oldest book days (hard 7-day floor) above DISK_USAGE_HALT_PCT.
  # No credentials, no execution — it only rewrites/deletes lake files.
  tick-lake-maintenance:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "vnedge.data.tick_lake_maintenance",
              "--data-root", "/app/data",
              "--interval-seconds", "${TICK_MAINTENANCE_INTERVAL_SECONDS:-21600}"]
    environment:
      TICK_RETENTION_BOOK_DAYS: "${TICK_RETENTION_BOOK_DAYS:-21}"
      TICK_RETENTION_TRADES_DAYS: "${TICK_RETENTION_TRADES_DAYS:-60}"
      TICK_RETENTION_LIQUIDATIONS_DAYS: "${TICK_RETENTION_LIQUIDATIONS_DAYS:-120}"
      DISK_USAGE_HALT_PCT: "${DISK_USAGE_HALT_PCT:-85}"
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Internet-facing TLS front (self-signed) so the read-only dashboard needs
  # no SSH tunnel. Port 8765 must be open in the cloud security list.
  # Edge hardening lives in deploy/Caddyfile + docs/DEPLOY.md §7:
  # DASHBOARD_ALLOWLIST restricts source IPs; empty = allow-all (token-only).
  dashboard-tls:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [multi-lane-shadow]
    environment:
      # Comma-separated client CIDRs/IPs allowed through the TLS front,
      # e.g. "203.0.113.7/32,198.51.100.0/24". EMPTY = every source IP is
      # allowed and DASHBOARD_TOKEN is the only protection.
      DASHBOARD_ALLOWLIST: "${DASHBOARD_ALLOWLIST:-}"
      # Only used once the ACME block in deploy/Caddyfile is uncommented.
      DASHBOARD_DOMAIN: "${DASHBOARD_DOMAIN:-}"
    # Same process the stock image runs, prefixed by one translation step:
    # Caddy's remote_ip matcher wants space-separated ranges while .env keeps
    # the ergonomic comma-separated form. An empty/blank allowlist is UNSET so
    # the Caddyfile's {$DASHBOARD_ALLOWLIST:allow-all-default} takes over
    # (Caddy only applies the default when the variable is absent).
    command:
      - sh
      - -c
      - |
        DASHBOARD_ALLOWLIST="$$(printf '%s' "$$DASHBOARD_ALLOWLIST" | tr ',' ' ')"
        if [ -z "$$(printf '%s' "$$DASHBOARD_ALLOWLIST" | tr -d ' ')" ]; then
            unset DASHBOARD_ALLOWLIST
        else
            export DASHBOARD_ALLOWLIST
        fi
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    ports:
      - "8765:8765"
      # Uncomment for the real-certificate (ACME) upgrade path — see
      # deploy/Caddyfile and docs/DEPLOY.md §7. Both ports must also be
      # opened in the cloud security list.
      # - "80:80"
      # - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/certs:/certs:ro
      - caddy_data:/data
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }

volumes:
  caddy_data:
